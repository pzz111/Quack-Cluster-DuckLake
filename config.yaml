# ============================================================
# Quack-Cluster 配置文件
# ============================================================
# 此文件包含 Quack-Cluster 的所有可配置参数
# 注释说明请参考 settings.py 中的详细中文注释
#
# 配置优先级（从高到低）：
# 1. 环境变量（如果在代码中设置了）
# 2. 此配置文件中的值
# 3. 配置项的默认值
#
# 使用方式：
# - 直接修改此文件的值即可生效
# - 无需修改代码即可调整系统行为

# ============================================================
# 数据目录配置
# ============================================================
# 数据文件存放的目录路径
# Docker 容器内默认: /app/sample_data
data_dir: "/app/sample_data"

# ============================================================
# 分区连接配置
# ============================================================
# 分区连接（Shuffle Join）将数据分成多少个分区
# 建议值：4-16
num_shuffle_partitions: 4

# ============================================================
# 广播连接配置
# ============================================================
# 小于这个大小的表会使用广播连接（单位：MB）
# 0 表示默认使用分区连接（保守策略）
# 建议值：100-500
broadcast_threshold_mb: 0

# ============================================================
# 容错配置
# ============================================================
# 任务失败时的最大重试次数
# 建议值：3-5
max_retries: 3

# ============================================================
# 缓存配置
# ============================================================
# 查询结果缓存的生存时间（秒）
# 300 秒 = 5 分钟
cache_ttl_seconds: 300

# ============================================================
# DuckLake 配置（可选）
# ============================================================
# DuckLake 是 DuckDB 的 Iceberg 风格数据目录扩展
# 如果启用，系统会通过 DuckLake 访问数据

# 是否启用 DuckLake
# true = 启用，false = 禁用（默认）
ducklake_enabled: false

# DuckLake 目录名称（在 DuckDB 中 attach 后的别名）
ducklake_catalog_name: "ducklake_catalog"

# PostgreSQL 连接信息（用于 DuckLake 元数据存储）
# 格式：host:port
# 示例：postgres:5432 或 localhost:5432
ducklake_postgres_conn: ""

# S3 数据文件路径（存放 Parquet 等数据文件的位置）
# 格式：s3://bucket-name/path/
# 示例：s3://my-data-lake/warehouse/
ducklake_s3_path: ""

# ============================================================
# API 配置
# ============================================================
# API 服务器配置
api_host: "0.0.0.0"
api_port: 8000

# ============================================================
# Ray 集群配置
# ============================================================
# Ray Dashboard 主机
ray_dashboard_host: "0.0.0.0"
